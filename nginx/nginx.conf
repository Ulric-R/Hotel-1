user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 25M;   # allow image uploads

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  upstream Fanja_api {
    server backend:8000;
  }

  server {
    listen 80 default_server;
    server_name _;

    # ================================================================
    # PUBLIC FRONTEND (no auth)
    # ================================================================
    root /usr/share/nginx/html;
    index index.html;

    # Public read-only API — no authentication
    location /api/ {
      # Block admin endpoints from the unprotected path
      location ~ ^/api/admin/ {
        return 403;
      }
      proxy_pass         http://Fanja_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # User-uploaded files (public, read-only)
    location /uploads/ {
      proxy_pass http://Fanja_api;
      proxy_set_header Host $host;
    }

    # ================================================================
    # ADMIN AREA — protected by HTTP Basic Auth
    # The browser shows its native credentials popup; no login page needed.
    # ================================================================

    # Admin SPA shell. We serve the same index.html and let the React
    # router show the admin UI when the path starts with /admin.
    location /admin {
      auth_basic           "Fanja Admin — Accès restreint";
      auth_basic_user_file /etc/nginx/.htpasswd;

      # Pass the authenticated user to downstream (useful for logging)
      add_header X-Authenticated-User $remote_user always;

      try_files $uri /index.html;
    }

    # Admin API — same Basic Auth gate
    location /api/admin/ {
      auth_basic           "Fanja Admin — Accès restreint";
      auth_basic_user_file /etc/nginx/.htpasswd;

      proxy_pass         http://Fanja_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Remote-User     $remote_user;
    }

    # SPA fallback for everything else (public site)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
